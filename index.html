<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Westends Geschichte – Basic Frontend</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Westends Geschichte</h1>
        <p>Willkommen auf der Basic-Frontend-Seite</p>
    </header>

    <main>
        <button id="loadDataBtn">Daten vom Backend laden</button>
        <pre id="output"></pre>
    </main>

    <script>
        document.getElementById("loadDataBtn").onclick = async () => {
            
           const response = await fetch("https:/westendsgeschichte-3.onrender.com/api/hello");
          const text = await response.text();

        // document.getElementById("output").textContent = response;
            
        // var text= "HIIIIIIIIIIIIIIIIER";
            
       document.getElementById("output").textContent = text;
            //Quellübergreifende (Cross-Origin) Anfrage blockiert: Die Gleiche-Quelle-Regel verbietet das Lesen der externen Ressource auf https://google.de/. (Grund: CORS-Kopfzeile 'Access-Control-Allow-Origin' fehlt). Statuscode: 301.
        };
    </script>

</body>
</html>
