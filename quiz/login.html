<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizApp - Login</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/quiz.css">
</head>
<body>
    <div class="background-overlay"></div>
    <main class="login-container glass-card animate-fade-in">
        <h2>Willkommen</h2>
        <p class="subtitle">Bitte gib deinen Playertag ein</p>

        <div id="error-container" class="error-message hidden"></div>

        <form id="login-form">
            <div class="input-group">
                <label for="username">PLAYERTAG</label>
                <input type="text" id="playertag" required placeholder="Dein Playertag">
            </div>
        </form>
        <button id="btn-to-leaderboard-name" class="btn btn-primary">Zum Leaderboard</button>
        <button id="btn-to-leaderboard-anonym" class="btn btn-secundary">Anonym</button>
    </main>
    <script src="js/login.js" type="module"></script>
</body>
</html>
