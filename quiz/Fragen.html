<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizApp - Spiel</title>
    <link rel="stylesheet" href="css/quiz.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <main class="quiz-container glass-card">
        <div id="loading-view" class="view-state">
            <div class="spinner"></div>
            <p>Fragen werden geladen...</p>
        </div>

        <div id="error-view" class="view-state hidden">
            <div class="error-box">
                <h3>Hoppla! Ein Fehler ist aufgetreten</h3>
                <p id="error-text">Verbindung zum Server fehlgeschlagen.</p>
                <button id="btn-retry" class="btn btn-primary">Erneut versuchen</button>
            </div>
        </div>

        <div id="quiz-view" class="view-state hidden">
            <header class="quiz-header">
                <div class="header-main">
                    <h1>Wissens-Quiz</h1>
                    <div class="score-display">Punkte: <span id="current-score">0</span> / <span id="max-score">0</span></div>
                </div>
                <div class="progress-container">
                    <div class="progress-text">Frage <span id="current-question-num">1</span> von <span id="total-questions-num">0</span></div>
                    <div class="progress-bar-bg">
                        <div id="progress-bar-fill" class="progress-bar-fill"></div>
                    </div>
                </div>
            </header>

            <section class="question-section">
                <h2 id="question-text" class="question-title">Lade Frage...</h2>
                <div id="answers-grid" class="answers-grid">
                    </div>
            </section>
        </div>

        <div id="end-view" class="view-state hidden">
            <h2>Quiz beendet!</h2>
            <p class="final-score-text">Du hast <span id="final-score">0</span> Punkte erreicht!</p>
            <div class="button-group">
                <button id="btn-to-saveResult" class="btn btn-primary">Ergebnis speichern</button>
                <button id="btn-restart" class="btn btn-secondary">Nochmal spielen</button>
            </div>
        </div>
    </main>

    <script src="js/quiz.js" type="module"></script>
</body>
</html>
